name: Scrape fleet data
on:
  schedule:
    - cron: '0 2 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./scraper/requirements.txt

      - name: Set up browser
        uses: browser-actions/setup-firefox@v1

      - name: Scrape
        run: |
          python ./scraper/main.py

      - name: Create "_data" directory
        run: mkdir -p _data

      - name: Calculate MD5 checksum
        run: |
          md5sum fleet.json | cut -c -32 | tr -d '\n' > fleet.json.md5
          md5sum  fleet.min.json | cut -c -32 | tr -d '\n' > fleet.min.json.md5

      - name: Copy results to "_data" directory
        run: |
          cp \
          fleet.json \
          fleet.json.md5 \
          fleet.min.json \
          fleet.min.json.md5 \
          _data/

      - name: Update resources
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _data
          commit-message: Update resources
          branch: data
          clean: false
